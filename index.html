<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Executive Intelligence — Payments</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Executive Intelligence</h1>
      <p class="description">Strategic synthesis of critical market developments</p>
    </header>

    <div class="summary-tabs">
      <button class="tab-btn active" data-tab="daily">Daily</button>
      <button class="tab-btn" data-tab="weekly">Weekly</button>
      <button class="tab-btn" data-tab="monthly">Monthly</button>
    </div>

    <div class="summary-nav">
      <button id="prev-btn" class="nav-btn">← Previous</button>
      <span class="summary-date" id="current-date">Today</span>
      <button id="next-btn" class="nav-btn">Next →</button>
    </div>

    <div id="summary-container" class="summary-card">
      <div class="summary-headline" id="summary-headline">Loading...</div>
      <div class="summary-date-display" id="summary-date">—</div>
      <div class="summary-body" id="summary-body">
        <p>Loading summary data...</p>
      </div>
    </div>

    <div class="articles-section">
      <h3>Source Articles</h3>
      <p>Full articles and deep dives behind this summary</p>
      <div id="articles-container" class="articles-grid"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
