name: Daily Intelligence Pipeline

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC (6am ET) every day
  workflow_dispatch:
    inputs:
      weekly:
        description: 'Force weekly summary generation'
        type: boolean
        default: false
      monthly:
        description: 'Force monthly summary generation'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pipeline-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run intelligence pipeline
        run: |
          ARGS=""
          [[ "${{ github.event.inputs.weekly }}"  == "true" ]] && ARGS="$ARGS --weekly"
          [[ "${{ github.event.inputs.monthly }}" == "true" ]] && ARGS="$ARGS --monthly"
          node scripts/run-pipeline.js $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name  "Payments Intel Bot"
          git config user.email "noreply@github.com"
          git add data/
          git diff --staged --quiet && echo "No new data." || git commit -m "Intel update: $(date -u +%Y-%m-%d)"
          git push

      - name: Build public site
        run: node scripts/build-public-site.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
